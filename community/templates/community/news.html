<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أخبار ومشاركات حي مارنجان</title>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #00e5ff;
            padding-bottom: 10px;
        }
        .header h1 {
            color: #00e5ff;
        }
        .post-card {
            background-color: #1f2937;
            border: 1px solid #374151;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .post-title {
            color: #00e5ff;
            margin-top: 0;
            font-size: 1.4rem;
        }
        .post-content {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-line;
            color: #e5e7eb;
        }
        .post-meta {
            color: #9ca3af;
            font-size: 0.85rem;
            border-top: 1px solid #374151;
            padding-top: 10px;
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }
        .back-btn {
            display: inline-block;
            background-color: #00e5ff;
            color: #0d1117;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">⬅️ العودة للرئيسية</a>
        
        <div class="header">
            <h1>📰 أخبار ومشاركات مجتمع مارنجان</h1>
        </div>

        {% for post in posts %}
            <div class="post-card">
                <h2 class="post-title">{{ post.title }}</h2>
                <p class="post-content">{{ post.content }}</p>
                <div class="post-meta">
                    <span>✍️ بواسطة: {{ post.author.username }}</span>
                    <span>📅 {{ post.created_at|date:"Y-m-d H:i" }}</span>
                </div>
            </div>
        {% empty %}
            <p style="text-align: center; color: #9ca3af; font-style: italic;">
                لا توجد أخبار أو منشورات منشورة حالياً.
            </p>
        {% endfor %}
    </div>
</body>
</html>
