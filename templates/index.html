<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجتمع مارنجان</title>
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0b1120; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; }
        .main-container { background-color: #161b22; padding: 20px; max-width: 600px; margin: auto; min-height: 100vh; }
        .top-header { text-align: center; margin-bottom: 20px; }
        .sparkle { color: #facc15; font-size: 1.5rem; }
        .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .service-card { background-color: #1f2937; border: 1px solid #374151; padding: 15px; text-align: center; border-radius: 10px; color: white; text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .service-card .icon { font-size: 1.8rem; margin-bottom: 5px; }
        .service-card span { font-size: 0.9em; }
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 10px; text-align: center; background-color: #00e5ff; color: #0d1117; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="top-header">
            <span class="sparkle">✨</span>
            <span>مجتمع مارنجان</span>
        </div>

        <div class="services-grid">
            {% for service in services %}
                {% if service.title == "أخبار الحي" %}
                    <a href="/community/news/" class="service-card">
                        <span class="icon">{{ service.icon }}</span>
                        <span>{{ service.title }}</span>
                    </a>
                {% else %}
                    <a href="{{ service.link }}" class="service-card">
                        <span class="icon">{{ service.icon }}</span>
                        <span>{{ service.title }}</span>
                    </a>
                {% endif %}
            {% endfor %}
        </div>

        <div class="action-buttons">
            <a href="{% url 'core:register' %}" class="btn">حساب جديد</a>
            <a href="{% url 'core:login' %}" class="btn">تسجيل دخول</a>
            <a href="{% url 'core:logout' %}" class="btn">خروج</a>
        </div>
    </div>
</body>
</html>
