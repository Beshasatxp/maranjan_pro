<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مارنجان</title>
    <style>
        body { background-color: #0b1120; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .box { background-color: #161b22; border: 2px solid #00e5ff; border-radius: 30px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 0 20px rgba(0, 229, 255, 0.2); text-align: center; }
        h2 { color: #00e5ff; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #374151; background: #1f2937; color: white; }
        button { width: 95%; padding: 15px; background: #00e5ff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #00c4cc; }
        a { color: #9ca3af; text-decoration: none; display: block; margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="box">
        <h2>تسجيل الدخول</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">دخول</button>
        </form>
    <a href="{% url 'core:index' %}">العودة للرئيسية</a>


    </div>
</body>
</html>
