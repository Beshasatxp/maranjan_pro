<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إنشاء حساب جديد</title>
    <style>
        body { font-family: sans-serif; background-color: #0d1117; color: #fff; padding: 20px; text-align: center; }
        .box { background: #161b22; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #30363d; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #00e5ff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; color: #000; font-weight: bold; }
        .helptext { display: none; } /* إخفاء التعليمات المزعجة */
    </style>
</head>
<body>
    <div class="box">
        <h2>إنشاء حساب جديد</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 15px;">
                    <label>{{ field.label }}</label><br>
                    {{ field }}
                </div>
            {% endfor %}
            <button type="submit">تسجيل</button>
        </form>
        <br><a href="{% url 'core:index' %}" style="color: #00e5ff;">العودة للرئيسية</a>
    </div>
</body>
</html>
